server:
  port: 8080

spring:
  application:
    name: dms-lite
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dms_lite}
    username: ${SPRING_DATASOURCE_USERNAME:dms}
    password: ${SPRING_DATASOURCE_PASSWORD:dms}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  cache:
    type: simple
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  jwt:
    secret: ${APP_JWT_SECRET:dms-lite-secret-key-must-be-at-least-32-characters}
    minutes: ${APP_JWT_MINUTES:180}
  queue:
    notifications: ${APP_NOTIFICATION_QUEUE:dms.notifications}
  messaging:
    rabbitmq:
      enabled: false
